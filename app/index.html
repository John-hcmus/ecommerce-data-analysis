<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Habit Interview</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <header>
      <h1>Habit Interview</h1>
      <p class="subtitle">Your strict high-performance habit coach</p>
    </header>

    <section id="chat" class="chat" aria-live="polite"></section>

    <form id="input-form" class="input-row">
      <input
        id="answer-input"
        type="text"
        placeholder="Type your answer..."
        autocomplete="off"
        required
      />
      <button type="submit">Send</button>
    </form>

    <section id="result" class="result hidden"></section>
  </main>

  <script src="app.js"></script>
</body>
</html>
